<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HWPX 규격서 개정 비교</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<!-- diff 웹 프론트엔드 셸 — Qt DiffReviewWindow(src/hwpxdiff/app.py)의 웹 이관. 단일 화면:
     상단 판본 피커/비교 + KPI + 종류 필터, 하단 좌 변경리스트 · 우 전문 신구대비표 스플릿.
     안정 DOM(id) + diff.js 가 window.__push('diff', snapshot) 로 값만 채운다(filler run 패턴).
     비교 엔진 hwpxdiff.diff 는 무변경 재사용 — 색/라벨/성형은 core 소유값을 snapshot 으로 받는다. -->
<div class="app" id="scr-diff">
  <header class="scr-head">
    <div>
      <h1>규격서 개정 비교</h1>
      <p class="sub">구판·신판 HWPX 를 골라 조문 단위 변경(추가·삭제·변경·번호변경)을 검토합니다.</p>
    </div>
    <div class="status" id="diffStatus" data-level="idle">판본 선택</div>
  </header>

  <!-- 판본 선택 + 비교 -->
  <div class="pickbar">
    <div class="pick">
      <span class="lbl">구판</span>
      <input class="field ro" id="oldLabel" type="text" readonly placeholder="구판을 선택하세요">
      <button class="btn" id="pickOld">선택…</button>
    </div>
    <div class="pick">
      <span class="lbl">신판</span>
      <input class="field ro" id="newLabel" type="text" readonly placeholder="신판을 선택하세요">
      <button class="btn" id="pickNew">선택…</button>
    </div>
    <div class="pick-actions">
      <div class="recent-wrap">
        <button class="btn sm" id="recentBtn" disabled>최근 ▾</button>
        <div class="recent-menu hidden" id="recentMenu"></div>
      </div>
      <button class="btn primary" id="compareBtn" disabled>비교</button>
    </div>
  </div>

  <!-- 요약 KPI(비교 전엔 빈 상태 안내) -->
  <div class="kpis" id="diffKpis" style="display:none"></div>
  <!-- 변경 0건/필터 결론/에러 등 확정 문장 -->
  <p class="summary-line" id="diffSummary" style="display:none"></p>

  <!-- 종류 필터(클라이언트측 표시 토글) -->
  <div class="filters" id="diffFilters" style="display:none">
    <span class="lbl">표시</span>
    <label class="chk"><input type="checkbox" id="fAdded" checked> 추가</label>
    <label class="chk"><input type="checkbox" id="fRemoved" checked> 삭제</label>
    <label class="chk"><input type="checkbox" id="fChanged" checked> 변경</label>
    <label class="chk sep"><input type="checkbox" id="fRenumber"> 번호변경 표시</label>
    <span class="filter-notice danger" id="filterNotice" style="display:none"></span>
  </div>

  <!-- 메인 스플릿: 좌 변경 리스트 · 우 전문 신구대비표 -->
  <div class="split" id="diffSplit" style="display:none">
    <section class="pane list">
      <h4>변경 목록</h4>
      <div class="changelist" id="changeList"></div>
    </section>
    <section class="pane doc">
      <h4>전문 신구대비표</h4>
      <div class="docview" id="docView"></div>
    </section>
  </div>

  <!-- 빈/진행/에러 상태 오버레이 -->
  <div class="stage-note" id="stageNote">구판·신판을 선택한 뒤 <b>비교</b>를 누르세요.</div>
</div>

<script src="js/bridge.js"></script>
<script src="js/screens/diff.js"></script>
<script src="js/app.js"></script>
</body>
</html>
