[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hwpx-tools"
version = "0.1.0"
description = "HWPX 도구 모음 — 공통 파서(hwpxcore) 위의 두 제품: 개정 비교(hwpxdiff)·누름틀 주입(hwpxfiller)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "lxml>=5.0",
    "openpyxl>=3.1",
]

[project.optional-dependencies]
gui = ["PySide6>=6.6"]
dev = ["pytest>=8.0"]
package = ["pyinstaller>=6.21"]

[project.scripts]
hwpxfiller = "hwpxfiller.cli:main"
hwpxdiff = "hwpxdiff.cli:main"

[project.gui-scripts]
hwpx-filler = "hwpxfiller.gui.app:main"
hwpx-diff = "hwpxdiff.app:main"

[tool.hatch.build.targets.wheel]
packages = ["src/hwpxcore", "src/hwpxdiff", "src/hwpxfiller"]

[tool.pytest.ini_options]
testpaths = ["tests"]
