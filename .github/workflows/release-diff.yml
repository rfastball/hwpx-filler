name: release-diff

# hwpx-diff 단독 릴리스 채널. 결합 릴리스(release.yml, v* 태그 = filler+diff)와 달리
# 이 워크플로는 hwpx-diff 산출물만 빌드·서명·게시한다. hwpxfiller 가 아직 개발 중일 때
# diff 만 독립적으로 배포하기 위한 것. 트리거 태그 네임스페이스가 다르므로(diff-v*)
# 결합 릴리스와 충돌하지 않는다.
on:
  push:
    tags: ["diff-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing diff-vX.Y.Z tag to release
        required: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      SIGN_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      SIGN_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked environment
        run: uv sync --locked --all-extras --group dev --group build
      - name: Validate release version
        run: uv run python scripts/check_release_version.py --prefix diff- $env:RELEASE_TAG
      - name: Quality and tests
        shell: pwsh
        run: .\test.ps1
      - name: Build portable application
        shell: pwsh
        run: .\build.ps1 -App diff
      - name: Validate signing configuration
        shell: pwsh
        run: |
          $hasCert = -not [string]::IsNullOrWhiteSpace($env:SIGN_CERTIFICATE)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:SIGN_PASSWORD)
          if ($hasCert -xor $hasPassword) { throw 'Both signing secrets must be configured together.' }
          "SIGNED_RELEASE=$($hasCert.ToString().ToLowerInvariant())" | Out-File $env:GITHUB_ENV -Append
      - name: Sign portable application
        if: env.SIGNED_RELEASE == 'true'
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGN_CERTIFICATE))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw 'signtool.exe not found' }
          "SIGNTOOL=$($signtool.FullName)" | Out-File $env:GITHUB_ENV -Append
          & $signtool.FullName sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfx /p $env:SIGN_PASSWORD dist\hwpx-diff\hwpx-diff.exe
          & $signtool.FullName verify /pa dist\hwpx-diff\hwpx-diff.exe
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
      - name: Build product installer
        shell: pwsh
        run: .\package-installer.ps1 -App diff -SkipExe
      - name: Sign installer
        if: env.SIGNED_RELEASE == 'true'
        shell: pwsh
        run: |
          $installers = Get-ChildItem installer-dist\HWPX-Diff-*-Setup.exe
          & $env:SIGNTOOL sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f "$env:RUNNER_TEMP\codesign.pfx" /p $env:SIGN_PASSWORD $installers.FullName
          & $env:SIGNTOOL verify /pa $installers.FullName
      - name: Smoke test install and uninstall
        shell: pwsh
        run: |
          $diffDir = Join-Path $env:RUNNER_TEMP 'diff-installed'
          $diffSetup = Get-ChildItem installer-dist\HWPX-Diff-*-Setup.exe | Select-Object -First 1
          & $diffSetup.FullName /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=$diffDir
          if ($LASTEXITCODE -ne 0) { throw 'diff install failed' }
          & "$diffDir\hwpx-diff.exe" --selfcheck tests\corpus\real\spec_revision_2025.hwpx tests\corpus\real\spec_revision_2026.hwpx
          if ($LASTEXITCODE -ne 0) { throw 'installed diff selfcheck failed' }
          & "$diffDir\unins000.exe" /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
      - name: Package portable bundle
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG -replace '^diff-v', ''
          Compress-Archive -Path dist\hwpx-diff\* -DestinationPath ("installer-dist\HWPX-Diff-$version-portable.zip")
      - name: Create checksums and collect metadata
        shell: pwsh
        run: |
          Copy-Item build\version\build-metadata.json installer-dist\build-metadata.json
          $files = @(Get-ChildItem installer-dist\HWPX-Diff-*.exe) + @(Get-ChildItem installer-dist\HWPX-Diff-*.zip)
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content installer-dist\SHA256SUMS.txt -Encoding ascii
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: HWPX Diff ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-alpha') || contains(env.RELEASE_TAG, '-beta') || contains(env.RELEASE_TAG, '-rc') }}
          body: ${{ env.SIGNED_RELEASE == 'true' && 'Windows artifacts are Authenticode signed.' || 'Unsigned development release; verify SHA256SUMS.txt before use.' }}
          files: |
            installer-dist/HWPX-Diff-*-Setup.exe
            installer-dist/HWPX-Diff-*-portable.zip
            installer-dist/SHA256SUMS.txt
            installer-dist/build-metadata.json
