name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to release
        required: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      SIGN_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      SIGN_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked environment
        run: uv sync --locked --all-extras --group dev --group build
      - name: Validate release version
        run: uv run python scripts/check_release_version.py $env:RELEASE_TAG
      - name: Quality and tests
        shell: pwsh
        run: .\test.ps1
      - name: Build portable applications
        shell: pwsh
        run: .\build.ps1
      - name: Validate signing configuration
        shell: pwsh
        run: |
          $hasCert = -not [string]::IsNullOrWhiteSpace($env:SIGN_CERTIFICATE)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:SIGN_PASSWORD)
          if ($hasCert -xor $hasPassword) { throw 'Both signing secrets must be configured together.' }
          "SIGNED_RELEASE=$($hasCert.ToString().ToLowerInvariant())" | Out-File $env:GITHUB_ENV -Append
      - name: Sign portable applications
        if: env.SIGNED_RELEASE == 'true'
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGN_CERTIFICATE))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw 'signtool.exe not found' }
          "SIGNTOOL=$($signtool.FullName)" | Out-File $env:GITHUB_ENV -Append
          & $signtool.FullName sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfx /p $env:SIGN_PASSWORD dist\hwpx-filler-web\hwpx-filler-web.exe dist\hwpx-diff\hwpx-diff.exe
          & $signtool.FullName verify /pa dist\hwpx-filler-web\hwpx-filler-web.exe dist\hwpx-diff\hwpx-diff.exe
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
      - name: Build product installers
        shell: pwsh
        run: .\package-installer.ps1 -App all -SkipExe
      - name: Sign installers
        if: env.SIGNED_RELEASE == 'true'
        shell: pwsh
        run: |
          $installers = Get-ChildItem installer-dist\*.exe
          & $env:SIGNTOOL sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f "$env:RUNNER_TEMP\codesign.pfx" /p $env:SIGN_PASSWORD $installers.FullName
          & $env:SIGNTOOL verify /pa $installers.FullName
      - name: Smoke test install and uninstall
        shell: pwsh
        run: |
          # 설치 프로그램·onedir 앱 exe 모두 GUI 서브시스템이라 종료코드 포착이 취약하다.
          # Start-Process -Wait -PassThru 로 종료를 확실히 기다리고 .ExitCode 를 읽는다.
          # 설치는 Inno /LOG 를 남겨 실패 시 원인이 CI 로그에 보이게 한다.
          $ErrorActionPreference = 'Stop'
          $corpus = Resolve-Path 'tests\corpus\real'
          function Install-Product($setup, $dir, $label) {
            $log = Join-Path $env:RUNNER_TEMP "$label-install.log"
            $p = Start-Process -FilePath $setup.FullName -Wait -PassThru -ArgumentList @(
              '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', "/LOG=$log", "/DIR=$dir")
            if ($p.ExitCode -ne 0) {
              Write-Host "--- $label install log (tail) ---"
              if (Test-Path $log) { Get-Content $log -Tail 50 }
              throw "$label install failed (exit $($p.ExitCode))"
            }
          }
          function Invoke-SelfCheck($exe, $checkArgs, $label) {
            $p = Start-Process -FilePath $exe -Wait -PassThru -ArgumentList $checkArgs
            if ($p.ExitCode -ne 0) { throw "installed $label selfcheck failed (exit $($p.ExitCode))" }
          }
          function Uninstall-Product($dir, $label) {
            $p = Start-Process -FilePath (Join-Path $dir 'unins000.exe') -Wait -PassThru `
              -ArgumentList @('/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART')
            if ($p.ExitCode -ne 0) { throw "$label uninstall failed (exit $($p.ExitCode))" }
          }

          $fillerDir = Join-Path $env:RUNNER_TEMP 'filler-installed'
          $diffDir = Join-Path $env:RUNNER_TEMP 'diff-installed'
          $fillerSetup = Get-ChildItem installer-dist\HWPX-Filler-*-Setup.exe | Select-Object -First 1
          $diffSetup = Get-ChildItem installer-dist\HWPX-Diff-*-Setup.exe | Select-Object -First 1

          Install-Product $fillerSetup $fillerDir 'filler'
          Invoke-SelfCheck (Join-Path $fillerDir 'hwpx-filler-web.exe') @('--selfcheck') 'filler'
          Uninstall-Product $fillerDir 'filler'

          Install-Product $diffSetup $diffDir 'diff'
          Invoke-SelfCheck (Join-Path $diffDir 'hwpx-diff.exe') @(
            '--selfcheck',
            (Join-Path $corpus 'spec_revision_2025.hwpx'),
            (Join-Path $corpus 'spec_revision_2026.hwpx')) 'diff'
          Uninstall-Product $diffDir 'diff'
      - name: Package portable bundles
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.TrimStart('v')
          Compress-Archive -Path dist\hwpx-filler-web\* -DestinationPath ("installer-dist\HWPX-Filler-$version-portable.zip")
          Compress-Archive -Path dist\hwpx-diff\* -DestinationPath ("installer-dist\HWPX-Diff-$version-portable.zip")
      - name: Create checksums and collect metadata
        shell: pwsh
        run: |
          Copy-Item build\version\build-metadata.json installer-dist\build-metadata.json
          $files = @(Get-ChildItem installer-dist\*.exe) + @(Get-ChildItem installer-dist\*.zip)
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content installer-dist\SHA256SUMS.txt -Encoding ascii
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          body: ${{ env.SIGNED_RELEASE == 'true' && 'Windows artifacts are Authenticode signed.' || 'Unsigned development release; verify SHA256SUMS.txt before use.' }}
          files: |
            installer-dist/*.exe
            installer-dist/*.zip
            installer-dist/SHA256SUMS.txt
            installer-dist/build-metadata.json
